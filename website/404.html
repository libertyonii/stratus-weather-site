<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Stratus</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=IBM+Plex+Mono&display=swap" rel="stylesheet" />
  <style>
    body { background: #0a1628; color: #d4e4f7; font-family: 'DM Serif Display', serif;
           min-height: 100vh; display: flex; flex-direction: column;
           align-items: center; justify-content: center; text-align: center; padding: 2rem; }
    .code { font-size: clamp(6rem, 20vw, 14rem); font-style: italic; line-height: 1;
            background: linear-gradient(135deg, #4fc3f7, #e8a838);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
    h1 { font-size: 1.5rem; font-weight: 300; margin: 1rem 0 0.5rem; }
    p  { color: #6b8cae; font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; margin-bottom: 2.5rem; }
    a  { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; letter-spacing: 0.2em;
         text-transform: uppercase; color: #e8a838; text-decoration: none;
         border-bottom: 1px solid rgba(232,168,56,0.3); padding-bottom: 0.2rem; }
  </style>
</head>
<body>
  <p class="code">404</p>
  <h1>Page Not Found</h1>
  <p>This location doesn't appear on any forecast.</p>
  <a href="/">← Back to Stratus</a>
</body>
</html>
