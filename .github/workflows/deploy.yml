name: Deploy to Azure
 
on:
  push:
    branches: [main]        # Only runs on pushes to main
    paths: [website/**]     # Only triggers when website files change
 
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4   # Pull the repo code
      - uses: azure/login@v2        # Authenticate with Azure using Service Principal
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - run: |
          # Fetch the storage account key, then upload website folder to $web container
          KEY=$(az storage account keys list --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} --query '[0].value' -o tsv)
          az storage blob upload-batch --account-name ${{ secrets.AZURE_STORAGE_ACCOUNT }} --account-key "$KEY" --source ./website --destination '$web' --overwrite
